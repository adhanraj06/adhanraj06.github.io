<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Dhanraj's Resume</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Markazi+Text:wght@400..700&display=swap');

        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #525089;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            background-color: #2C3E50; /* Dark navy blue background */
            color: #ECF0F1; /* Very light gray text for contrast */
            padding: 20px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Soft shadow for depth */
        }

        /* Nav Links */
        header nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        header nav ul li {
            display: inline-block;
            margin: 0 20px;
        }

        header nav ul li a {
            font-family: 'Markazi Text', sans-serif;
            font-weight: bold;
            font-size: 1.5rem; /* Larger text for emphasis */
            text-decoration: none;
            color: #ECF0F1; /* Light gray text */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3); /* Soft shadow for text */
            position: relative;
            display: inline-block;
            padding: 5px 0;
            transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.3s ease; /* Smooth transition */
        }

        /* Hover Effect */
        header nav ul li a:hover {
            color: #1ABC9C; /* Teal color on hover */
            transform: scale(1.1); /* Slightly increase size for interactive feel */
            text-shadow: 0px 0px 10px rgba(26, 188, 156, 0.8); /* Soft teal glow effect on hover */
        }

        /* Active Link Style (Optional) */
        header nav ul li a.active {
            color: #1ABC9C; /* Active link color */
            text-shadow: 0px 0px 10px rgba(26, 188, 156, 0.8); /* Active link glow */
        }

        /* Main Content */
        main {
            flex-grow: 1;
            padding: 20px;
            text-align: center;
        }

        /* PDF Viewer */
        .pdf-viewer {
            margin: 20px 0;
        }

        .pdf-viewer embed {
            width: 80%;
            height: 1100px;
            margin: 0 auto;
            display: block;
        }

        /* Footer */
        footer {
            display: flex;
            justify-content: center;  /* Center horizontally */
            align-items: center;      /* Center vertically */
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
            position: relative;       /* Position relative to the container */
            width: 100%;              /* Make it span the full width */
            z-index: 999;             /* Ensure it's above other content */
            margin-top: auto;         /* This ensures the footer is pushed to the bottom when content is short */
        }

        footer p {
            font-family: 'Markazi Text', serif;
            font-size: 1.5rem;
            margin: 0;  /* Remove any default margin */
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="resume.html" class="active">Resume</a></li>
                <li><a href="projects.html">Projects</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="resume-section">
            <div class="resume-container">
                <!-- PDF Embed -->
                <div class="pdf-viewer">
                    <embed src="documents/Aditya_Dhanraj_Resume.pdf" type="application/pdf" width="100%" height="700px">
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© <span id="current-year"></span> Aditya Dhanraj. All rights reserved.</p>
    </footer>

    <script>
        const currentYear = new Date().getFullYear();
        document.getElementById('current-year').textContent = currentYear;
    </script>
</body>

</html>
